[workspace]
members = [
    "circuits/types",
    "circuits/payment",
    "circuits/deposit",
    "circuits/withdraw",
    "circuits/padding",

    # IVC pipeline (batch size 8): batch_app -> init/tail/hiding kernels -> Chonk -> tube.
    "circuits/batch_app",
    "circuits/init_kernel",
    "circuits/tail_kernel",
    "circuits/hiding_kernel",
    "circuits/tube",
    "contract_ivc",

    # Recursive pipeline (batch size 8 per sub-batch): batch_app_standalone -> wrapper.
    "circuits/batch_app_standalone",
    "circuits/wrapper",
    # Recursive aggregation, named by slot capacity:
    #   wrapper_16: merges 2 wrapper proofs       -> 16 slots (submit_batch_16)
    #   wrapper_32: merges 2 wrapper_16 proofs    -> 32 slots (intermediate; not a submit target)
    #   wrapper_64: merges 2 wrapper_32 proofs    -> 64 slots (submit_batch_64)
    "circuits/wrapper_16",
    "circuits/wrapper_32",
    "circuits/wrapper_64",
    # Path C: pair_tube merges 2 IVC tube proofs (RollupHonk, 519 fields)
    # into 1 merged proof via verify_rolluphonk_proof.
    "circuits/pair_tube",
    "contract_recursive",
]
